---
- name: Proof of Concept - Write File to Disk
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Create a test file with content
      ansible.builtin.copy:
        content: "This file was created by Ansible at {{ ansible_date_time.iso8601 | default('unknown time') }}.\nProof of Concept successful.\n"
        dest: "/tmp/ansible_poc_test.txt"
        mode: '0644'
      register: file_result

    - name: Display confirmation
      ansible.builtin.debug:
        msg: "File created at {{ file_result.dest }} with {{ file_result.changed | ternary('changes made', 'no changes needed') }}."
