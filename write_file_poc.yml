---
- name: Proof of Concept - Write File with Random Content
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Generate a random number
      ansible.builtin.set_fact:
        random_id: "{{ 1000000 | random }}"

    - name: Create a test file with random content
      ansible.builtin.copy:
        content: |
          Proof of Concept successful.
          Run ID: {{ random_id }}
          This content changes on every execution.
        dest: "/tmp/ansible_poc_test.txt"
        mode: '0644'
      register: file_result

    - name: Display confirmation
      ansible.builtin.debug:
        msg: "File updated with Run ID: {{ random_id }}. Status: {{ 'Changed' if file_result.changed else 'Unchanged' }}"
