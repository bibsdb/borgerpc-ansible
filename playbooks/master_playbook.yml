---
- name: Master Pull Orchestrator
  hosts: all
  connection: local
  gather_facts: yes

  tasks:
    - name: Initialize playbook list
      set_fact:
        required_playbooks: []

    - name: Load group playbook vars
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../group_vars/{{ item }}.yml"
        name: "group_data_{{ item }}"
      loop: "{{ group_names }}"

    # group_names is an Ansible magic variable: the list of groups the current
    # host belongs to. We load each group's vars file and then aggregate the
    # playbook list via the namespaced key, e.g. borgerpc_basis_playbooks.
    - name: Aggregate task files from group membership
      set_fact:
        required_playbooks: "{{ required_playbooks + (vars['group_data_' + item][item + '_playbooks'] | default([])) }}"
      loop: "{{ group_names }}"

    - name: Run assigned task files
      include_tasks: "{{ playbook_item }}"
      loop: "{{ required_playbooks }}"
      loop_control:
        loop_var: playbook_item
