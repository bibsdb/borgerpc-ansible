---
- name: Master Pull Orchestrator
  hosts: all
  connection: local
  gather_facts: yes

  tasks:
    - name: Initialize playbook list
      set_fact:
        required_playbooks: []

    # group_names is an Ansible magic variable: the list of groups the current
    # host belongs to (as defined in inventory/hosts). We look up each group's
    # task list via a namespaced variable, e.g. borgerpc_basis_playbooks.
    - name: Aggregate task files from group membership
      set_fact:
        required_playbooks: "{{ required_playbooks + (vars[item + '_playbooks'] | default([])) }}"
      loop: "{{ group_names }}"

    - name: Run assigned task files
      include_tasks: "{{ playbook_item }}"
      loop: "{{ required_playbooks }}"
      loop_control:
        loop_var: playbook_item
